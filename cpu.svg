<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <radialGradient id="dieGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a2d32" />
      <stop offset="70%" stop-color="#1e2024" />
      <stop offset="100%" stop-color="#111215" />
    </radialGradient>

    <linearGradient id="goldPins" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffeea1" />
      <stop offset="40%" stop-color="#d4af37" />
      <stop offset="70%" stop-color="#aa820a" />
      <stop offset="100%" stop-color="#614902" />
    </linearGradient>

    <linearGradient id="metalIHS" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0f0f0" />
      <stop offset="30%" stop-color="#e1e4e6" />
      <stop offset="50%" stop-color="#ccd01cf" />
      <stop offset="70%" stop-color="#b8bcbe" />
      <stop offset="100%" stop-color="#8a8d8f" />
    </linearGradient>

    <linearGradient id="siliconMirror" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#111" />
      <stop offset="25%" stop-color="#1d1626" />
      <stop offset="50%" stop-color="#3b1d54" />
      <stop offset="60%" stop-color="#213a59" />
      <stop offset="75%" stop-color="#0d1f2d" />
      <stop offset="100%" stop-color="#111" />
    </linearGradient>

    <filter id="traceGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <style>
    .trace-bus { stroke: #00ffcc; stroke-width: 1.2; stroke-linecap: round; stroke-linejoin: round; fill: none; opacity: 0.35; }
    .trace-bus-active { stroke: #00ffcc; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; fill: none; filter: url(#traceGlow); }
    .node-point { fill: #00ffcc; filter: url(#traceGlow); }
    .gold-element { fill: url(#goldPins); }
    .die-core { fill: url(#dieGrad); stroke: #2d3139; stroke-width: 2; }
    .engraving { font-family: 'Courier New', Courier, monospace; font-weight: bold; fill: #5f646d; letter-spacing: 1px; }
  </style>

  <g id="interconnect-pins">
    <path class="gold-element" d="M 90,55 h 12 v 15 h -12 z M 120,55 h 12 v 15 h -12 z M 150,55 h 12 v 15 h -12 z M 180,55 h 12 v 15 h -12 z M 210,55 h 12 v 15 h -12 z M 240,55 h 12 v 15 h -12 z M 270,55 h 12 v 15 h -12 z M 300,55 h 12 v 15 h -12 z M 330,55 h 12 v 15 h -12 z M 360,55 h 12 v 15 h -12 z M 390,55 h 12 v 15 h -12 z" />
    <path class="gold-element" d="M 90,430 h 12 v 15 h -12 z M 120,430 h 12 v 15 h -12 z M 150,430 h 12 v 15 h -12 z M 180,430 h 12 v 15 h -12 z M 210,430 h 12 v 15 h -12 z M 240,430 h 12 v 15 h -12 z M 270,430 h 12 v 15 h -12 z M 300,430 h 12 v 15 h -12 z M 330,430 h 12 v 15 h -12 z M 360,430 h 12 v 15 h -12 z M 390,430 h 12 v 15 h -12 z" />
    <path class="gold-element" d="M 55,90 h 15 v 12 h -15 z M 55,120 h 15 v 12 h -15 z M 55,150 h 15 v 12 h -15 z M 55,180 h 15 v 12 h -15 z M 55,210 h 15 v 12 h -15 z M 55,240 h 15 v 12 h -15 z M 55,270 h 15 v 12 h -15 z M 55,300 h 15 v 12 h -15 z M 55,330 h 15 v 12 h -15 z M 55,360 h 15 v 12 h -15 z M 55,390 h 15 v 12 h -15 z" />
    <path class="gold-element" d="M 430,90 h 15 v 12 h -15 z M 430,120 h 15 v 12 h -15 z M 430,150 h 15 v 12 h -15 z M 430,180 h 15 v 12 h -15 z M 430,210 h 15 v 12 h -15 z M 430,240 h 15 v 12 h -15 z M 430,270 h 15 v 12 h -15 z M 430,300 h 15 v 12 h -15 z M 430,330 h 15 v 12 h -15 z M 430,360 h 15 v 12 h -15 z M 430,390 h 15 v 12 h -15 z" />
  </g>

  <rect x="70" y="70" width="360" height="360" rx="8" fill="#1b4431" stroke="#123022" stroke-width="3" />
  
  <polygon points="70,85 85,70 70,70" fill="url(#goldPins)" />

  <g id="surface-passives" fill="#8b8680" stroke="#5c5854" stroke-width="1">
    <rect x="85" y="100" width="8" height="14" />
    <rect x="85" y="125" width="8" height="14" />
    <rect x="395" y="100" width="8" height="14" />
    <rect x="407" y="100" width="14" height="8" />
    <rect x="85" y="375" width="8" height="14" />
    <rect x="395" y="375" width="8" height="14" />
  </g>

  <g id="substrate-traces">
    <path class="trace-bus" d="M 96,107 H 140 L 170,137 V 190" />
    <path class="trace-bus" d="M 96,132 H 135 L 160,157 V 190" />
    <path class="trace-bus" d="M 401,114 H 360 L 330,144 V 190" />
    <path class="trace-bus" d="M 96,382 H 140 L 170,352 V 310" />
    <path class="trace-bus" d="M 401,382 H 360 L 330,352 V 310" />
  </g>

  <rect x="110" y="110" width="280" height="280" rx="22" fill="url(#metalIHS)" stroke="#686b6d" stroke-width="1.5" />
  <rect x="122" y="122" width="256" height="256" rx="14" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.4" />
  <rect x="120" y="120" width="260" height="260" rx="16" fill="none" stroke="#7a7d7f" stroke-width="2.5" opacity="0.6" />

  <path d="M 110,180 C 125,180 125,200 110,200" fill="url(#metalIHS)" stroke="#7a7d7f" />
  <path d="M 390,180 C 375,180 375,200 390,200" fill="url(#metalIHS)" stroke="#7a7d7f" />

  <rect x="150" y="190" width="200" height="120" rx="2" class="die-core" />
  
  <rect x="152" y="192" width="196" height="116" rx="1" fill="url(#siliconMirror)" opacity="0.85" />

  <g id="die-partitions" stroke="#00ffcc" stroke-width="0.5" opacity="0.2">
    <rect x="160" y="200" width="40" height="30" fill="none" />
    <rect x="200" y="200" width="40" height="30" fill="none" />
    <rect x="240" y="200" width="40" height="30" fill="none" />
    <rect x="280" y="200" width="40" height="30" fill="none" />
    
    <rect x="160" y="230" width="40" height="30" fill="none" />
    <rect x="200" y="230" width="40" height="30" fill="none" />
    <rect x="240" y="230" width="40" height="30" fill="none" />
    <rect x="280" y="230" width="40" height="30" fill="none" />

    <rect x="160" y="265" width="160" height="20" fill="none" />
    <rect x="160" y="290" width="180" height="15" fill="none" />
  </g>

  <g id="active-interconnects">
    <path class="trace-bus-active" d="M 150,215 H 175 V 245 H 210" />
    <path class="trace-bus-active" d="M 175,230 H 195" />
    <path class="trace-bus-active" d="M 220,297 H 310 L 325,280 V 210" />
    <path class="trace-bus-active" d="M 245,297 V 260 H 275" />
    
    <circle cx="175" cy="215" r="2.5" class="node-point" />
    <circle cx="175" cy="230" r="2.5" class="node-point" />
    <circle cx="245" cy="297" r="2" class="node-point" />
    <circle cx="310" cy="297" r="2" class="node-point" />
  </g>

  <g id="laser-engravings" class="engraving">
    <text x="135" y="145" font-size="11">ILLUSTRIOUS MATRIX</text>
    <text x="135" y="160" font-size="9" fill="#4b4e54">SPATIAL-Z CORE v2.0</text>
    <text x="135" y="365" font-size="8">ASYNC-INF-7940499422</text>
    <text x="315" y="365" font-size="8">MADE IN AZ</text>
  </g>

</svg>
